<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #f0eee8;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
  }
  #clock-section { text-align: center; }
  #time {
    font-size: clamp(4rem, 14vw, 9rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    color: #f0eee8;
    font-family: 'Georgia', serif;
  }
  #date {
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: #888780;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
  }
  #divider { width: 1px; height: 40px; background: #2c2c2a; }
  .card-row {
    display: flex;
    gap: 1.5rem;
    width: 100%;
    max-width: 800px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    background: #12121a;
    border: 0.5px solid #2c2c2a;
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    flex: 1;
    min-width: 220px;
  }
  .card-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #5f5e5a;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    margin-bottom: 0.6rem;
  }
  #weather-temp {
    font-size: 2.8rem;
    font-weight: 300;
    line-height: 1;
    color: #f0eee8;
    font-family: 'Georgia', serif;
  }
  #weather-desc {
    font-size: 0.85rem;
    color: #888780;
    margin-top: 0.3rem;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
  }
  #weather-feels {
    font-size: 0.75rem;
    color: #5f5e5a;
    margin-top: 0.2rem;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  #word {
    font-size: 1.4rem;
    font-weight: 400;
    color: #f0eee8;
    font-family: 'Georgia', serif;
    font-style: italic;
  }
  #word-pos {
    font-size: 0.72rem;
    color: #534ab7;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    margin-top: 0.3rem;
  }
  #word-def {
    font-size: 0.8rem;
    color: #888780;
    margin-top: 0.4rem;
    line-height: 1.5;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
  }
  #quote-card {
    max-width: 800px;
    width: 100%;
    background: #12121a;
    border: 0.5px solid #2c2c2a;
    border-radius: 16px;
    padding: 1.5rem 2rem;
    border-left: 2px solid #534ab7;
  }
  #quote-text {
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    line-height: 1.7;
    color: #d3d1c7;
    font-family: 'Georgia', serif;
    font-style: italic;
  }
  #quote-author {
    font-size: 0.75rem;
    color: #5f5e5a;
    margin-top: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
  }
  .loading { color: #5f5e5a; font-size: 0.85rem; font-family: 'Helvetica Neue', Arial, sans-serif; }
</style>
</head>
<body>

<div id="clock-section">
  <div id="time">00:00</div>
  <div id="date">Loading...</div>
</div>

<div id="divider"></div>

<div class="card-row">
  <div class="card" id="weather-card">
    <div class="card-label">San Antonio</div>
    <div id="weather-temp" class="loading">--&deg;</div>
    <div id="weather-desc" class="loading">fetching weather...</div>
    <div id="weather-feels"></div>
  </div>
  <div class="card" id="word-card">
    <div class="card-label">Word of the day</div>
    <div id="word" class="loading">...</div>
    <div id="word-pos"></div>
    <div id="word-def"></div>
  </div>
</div>

<div id="quote-card">
  <div class="card-label">Today's thought</div>
  <div id="quote-text" class="loading">loading something good...</div>
  <div id="quote-author"></div>
</div>

<script>
var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12;
  if (h === 0) { h = 12; }
  var mStr = m < 10 ? '0' + m : '' + m;
  document.getElementById('time').textContent = h + ':' + mStr + ' ' + ampm;
  document.getElementById('date').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

function fetchWeather() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.open-meteo.com/v1/forecast?latitude=29.4241&longitude=-98.4936&current=temperature_2m,apparent_temperature,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          var temp = Math.round(data.current.temperature_2m);
          var feels = Math.round(data.current.apparent_temperature);
          var code = data.current.weather_code;
          var descs = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Rain showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
          document.getElementById('weather-temp').textContent = temp + '\u00b0F';
          document.getElementById('weather-desc').textContent = descs[code] || 'Unknown';
          document.getElementById('weather-feels').textContent = 'Feels like ' + feels + '\u00b0F';
        } catch(e) {
          document.getElementById('weather-desc').textContent = 'Weather unavailable';
        }
      } else {
        document.getElementById('weather-desc').textContent = 'Weather unavailable';
      }
    }
  };
  xhr.send();
}
fetchWeather();
setInterval(fetchWeather, 600000);
